services:
  mysql:
    image: mysql:5.7
    container_name: senac-mysql57
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: 20261_prjint3_manha_michaeloliveira
      MYSQL_ROOT_PASSWORD: root
      TZ: America/Sao_Paulo
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql

volumes:
  mysql_data:
